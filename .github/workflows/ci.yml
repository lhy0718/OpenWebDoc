name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - research/htmlxbench-pilot

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Guard repository scope
        run: pnpm guard:repo

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Validate basic example
        run: pnpm exec htmlx validate examples/basic.htmlx

      - name: Reject invalid example
        run: |
          if pnpm exec htmlx validate examples/security-invalid.htmlx; then
            echo "security-invalid.htmlx unexpectedly passed validation"
            exit 1
          fi
