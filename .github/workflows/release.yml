name: Release

on:
  workflow_dispatch:
    inputs:
      publish_npm:
        description: Publish npm packages after release checks pass.
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release check
        run: pnpm release:check

      - name: Upload npm tarballs
        uses: actions/upload-artifact@v4
        with:
          name: npm-packages
          path: dist/npm/*.tgz

      - name: Upload static site
        uses: actions/upload-artifact@v4
        with:
          name: static-site
          path: dist/site

      - name: Publish npm packages
        if: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.publish_npm == 'true' }}
        run: pnpm -r --filter "./packages/*" publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
